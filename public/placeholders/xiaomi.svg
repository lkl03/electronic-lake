<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Background -->
  <rect width="400" height="500" fill="#0d0d0d"/>

  <!-- Orange glow at top -->
  <radialGradient id="og" cx="50%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#ff6900" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="500" fill="url(#og)"/>

  <!-- Phone body -->
  <rect x="88" y="50" width="224" height="400" rx="42" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="93" y="55" width="214" height="390" rx="37" fill="#111111"/>

  <!-- Camera module (square, top-left) -->
  <rect x="105" y="68" width="68" height="68" rx="16" fill="#0a0a0a" stroke="#222" stroke-width="1.5"/>
  <!-- Camera lenses -->
  <circle cx="125" cy="88" r="12" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="125" cy="88" r="7.5" fill="#111827" stroke="#222" stroke-width="1"/>
  <circle cx="125" cy="88" r="3.5" fill="#0a1020" opacity="0.9"/>
  <circle cx="151" cy="88" r="10" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="151" cy="88" r="6" fill="#111827"/>
  <circle cx="151" cy="88" r="2.5" fill="#0a1020" opacity="0.9"/>
  <circle cx="125" cy="114" r="10" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="125" cy="114" r="6" fill="#111827"/>
  <circle cx="125" cy="114" r="2.5" fill="#0a1020" opacity="0.9"/>
  <!-- Flash -->
  <circle cx="151" cy="116" r="5" fill="#2a1a00" stroke="#3a2500" stroke-width="1"/>
  <circle cx="151" cy="116" r="2.5" fill="#ff9500" opacity="0.6"/>

  <!-- Leica text (for Mi models) -->
  <text x="135" y="152" text-anchor="middle"
    font-family="serif"
    font-size="6" letter-spacing="2"
    fill="#555">LEICA</text>

  <!-- Mi logo in screen center -->
  <g transform="translate(200, 255)" opacity="0.8">
    <!-- Mi wordmark: M + i -->
    <!-- M shape -->
    <path d="M-32-20 L-32 20 L-22 20 L-22-6 L-12 14 L-2-6 L-2 20 L8 20 L8-20 L-2-20 L-12 0 L-22-20 Z" fill="#ff6900"/>
    <!-- i dot and stem -->
    <circle cx="22" cy="-14" r="4" fill="#ff6900"/>
    <rect x="18" y="-5" width="8" height="25" rx="2" fill="#ff6900"/>
  </g>

  <!-- Bottom indicator -->
  <rect x="155" y="416" width="90" height="4" rx="2" fill="#222"/>

  <!-- Side buttons -->
  <rect x="310" y="148" width="5" height="55" rx="2.5" fill="#1a1a1a"/>
  <rect x="85" y="150" width="5" height="72" rx="2.5" fill="#1a1a1a"/>

  <!-- Brand text -->
  <text x="200" y="340" text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="11" font-weight="300" letter-spacing="5"
    fill="#333">XIAOMI</text>
</svg>
