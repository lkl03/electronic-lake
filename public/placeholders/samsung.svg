<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Background -->
  <rect width="400" height="500" fill="#050d1f"/>

  <!-- Glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#0a2d5e" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#020813" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="500" fill="url(#glow)"/>

  <!-- Phone body outer -->
  <rect x="90" y="50" width="220" height="400" rx="44" fill="none" stroke="#1e3a6e" stroke-width="2"/>
  <!-- Body fill -->
  <rect x="95" y="55" width="210" height="390" rx="39" fill="#090f1c"/>

  <!-- Top bezel / sensor bar -->
  <rect x="95" y="55" width="210" height="22" rx="0" fill="#07111d"/>
  <rect x="95" y="55" width="210" height="22" rx="39" fill="#07111d"/>

  <!-- Punch-hole camera -->
  <circle cx="200" cy="84" r="7" fill="#020810"/>
  <circle cx="200" cy="84" r="4" fill="#0a1830" opacity="0.9"/>
  <circle cx="197" cy="81" r="1.5" fill="#1e4080" opacity="0.6"/>

  <!-- Screen gradient -->
  <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d2045" stop-opacity="0.5"/>
    <stop offset="50%" stop-color="#061230" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#020813" stop-opacity="0.1"/>
  </linearGradient>
  <rect x="97" y="57" width="206" height="386" rx="37" fill="url(#screen)"/>

  <!-- Samsung wordmark area -->
  <text x="200" y="230" text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="11" font-weight="400" letter-spacing="5"
    fill="#1e4a8a" opacity="0.9">SAMSUNG</text>

  <!-- Galaxy S letter -->
  <text x="200" y="272" text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="52" font-weight="100" letter-spacing="2"
    fill="#1a407a" opacity="0.7">S</text>

  <!-- Subtle side highlight -->
  <rect x="90" y="100" width="2" height="120" rx="1" fill="#1e3a6e" opacity="0.5"/>
  <rect x="308" y="140" width="2" height="80" rx="1" fill="#1e3a6e" opacity="0.5"/>

  <!-- Bottom bar -->
  <rect x="155" y="415" width="90" height="4" rx="2" fill="#0e1e3a"/>

  <!-- Side buttons -->
  <rect x="308" y="145" width="5" height="55" rx="2.5" fill="#0e1e3a"/>
  <rect x="87" y="140" width="5" height="36" rx="2.5" fill="#0e1e3a"/>
  <rect x="87" y="185" width="5" height="52" rx="2.5" fill="#0e1e3a"/>
</svg>
