<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#edeae0"/>
  <!-- Motorola batwing M in circle -->
  <g transform="translate(100,100)" opacity="0.8">
    <circle cx="0" cy="0" r="52" fill="#0b0e0a"/>
    <!-- Outer arc (top batwing) -->
    <path d="M -32 18 C -32 -14 -18 -32 0 -32 C 18 -32 32 -14 32 18"
      stroke="white" stroke-width="8.5" stroke-linecap="round" fill="none"/>
    <!-- Inner arch (bottom valley) -->
    <path d="M -18 18 C -18 4 -9 -4 0 -4 C 9 -4 18 4 18 18"
      stroke="white" stroke-width="8.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
